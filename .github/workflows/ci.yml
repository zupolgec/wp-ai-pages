name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-package:
    name: Lint and package smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PHP syntax check
        run: |
          git ls-files '*.php' | xargs -n 1 php -l

      - name: JavaScript syntax check
        run: |
          node --check assets/admin.js

      - name: Validate plugin metadata
        run: |
          PLUGIN_VERSION=$(awk -F': ' '/^[[:space:]]*\* Version:/ { print $2; exit }' ai-pages.php | tr -d '\r')
          STABLE_TAG=$(awk -F': ' '/^Stable tag:/ { print $2; exit }' readme.txt | tr -d '\r')
          TESTED_HEADER=$(awk -F': ' '/^[[:space:]]*\* Tested up to:/ { print $2; exit }' ai-pages.php | tr -d '\r')
          TESTED_README=$(awk -F': ' '/^Tested up to:/ { print $2; exit }' readme.txt | tr -d '\r')

          test -n "$PLUGIN_VERSION"
          test "$PLUGIN_VERSION" = "$STABLE_TAG"
          test "$TESTED_HEADER" = "$TESTED_README"

      - name: Build distributable zip
        run: |
          SLUG="ai-pages"
          VERSION=$(awk -F': ' '/^[[:space:]]*\* Version:/ { print $2; exit }' ai-pages.php | tr -d '\r')
          rm -rf build dist
          mkdir -p "build/$SLUG" dist
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='.playwright-cli' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='vendor' \
            ./ "build/$SLUG/"
          ( cd build && zip -r "../dist/$SLUG-$VERSION.zip" "$SLUG" )
          unzip -l "dist/$SLUG-$VERSION.zip"

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: ai-pages-plugin-zip
          path: dist/*.zip

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          slug: ai-pages
          build-dir: './'
          wp-version: 'latest'
          ignore-warnings: 'true'
